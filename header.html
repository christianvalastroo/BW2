  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airbnb Clone</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- BOOTSTRAP ICONS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- CSS -->
  <link rel="stylesheet" href="header.css">
</head>

<body>

    <header class="topbar">
        <nav class="navbar navbar-expand-lg py-3">
            <div class="container">

                <!-- logo -->
                <a href="#" class="navbar-brand brand me-0">
                    <img src="assets/logo-pink.png" alt="Airbnb logo">
                </a>

                  <!-- bottone hamburger -->
                <button class="navbar-toggler custom-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#airbnbNavbar" aria-controls="airbnbNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                 <!-- contenuto collassabile -->
                <div class="collapse navbar-collapse d-flex justify-content-end" id="airbnbNavbar">

                    <!-- parte destra -->
                     <div class="d-flex flex-column flex-lg-row align-items-start align-items-lg-center gap-2 gap-lg-3 topbar-right">
                        <a href="#" class="host-link text-decoration-none">Become a host</a>

                        <button class="icon-btn d-flex align-items-center justify-content-center" type="button">
                            <i class="bi bi-globe"></i>
                        </button>

                        <button class="profile-btn d-flex align-items-center gap-2" type="button">
                            <i class="bi bi-list" style="color: black;"></i>
                            <i class="bi bi-person-circle"></i>
                        </button>
                     </div>
                </div>
            </div>
        </nav>
    </header>
</body>
